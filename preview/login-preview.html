<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elite Control Login Preview</title>
  <link rel="stylesheet" href="../erpnext_elite_theme/public/css/elite_login.css">
  <style>
    body { margin: 0; }
    .page-card { padding: 54px 54px 42px; }
    .page-card-head h4 { margin: 0 0 10px; text-align: center; }
    .subtitle { color: #667085; font-weight: 700; margin-bottom: 34px; text-align: center; }
    label { display: block; margin: 0 0 10px; color: #132238; font-weight: 800; }
    .form-control { width: 100%; margin-bottom: 26px; padding: 0 14px; }
    .login-row { display: flex; justify-content: space-between; align-items: center; margin: -8px 0 24px; color: #667085; font-weight: 700; }
    .sso { width: 100%; min-height: 46px; border: 1px solid #d9e2ec; border-radius: 7px; background: #fff; color: #526176; font-weight: 800; }
    .separator { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 14px; margin: 28px 0 18px; color: #667085; font-weight: 700; }
    .separator::before, .separator::after { content: ""; height: 1px; background: #d9e2ec; }
    @media (max-width: 640px) { .page-card { padding: 32px 20px; } }
  </style>
</head>
<body class="elite-login-page">
  <div class="elite-login-shell">
    <section class="elite-login-showcase">
      <div class="elite-circuit-grid"></div>
      <div class="elite-login-brand">
        <img src="elite-control-logo.png" alt="Elite Control">
        <div class="elite-login-title">ELITE CONTROL</div>
        <div class="elite-login-subtitle">Integrated Solutions . Lasting Partnerships</div>
      </div>
      <div class="elite-login-promise">حلول متكاملة<br>لعلاقات تدوم</div>
      <div class="elite-login-features">
        <span>آمن وموثوق</span>
        <span>تقارير ذكية</span>
        <span>إدارة متكاملة</span>
      </div>
    </section>
    <section class="elite-login-form-panel">
      <div class="login-content">
        <div class="page-card">
          <div class="page-card-head"><h4>مرحبا بك مجددا</h4></div>
          <div class="subtitle">سجل الدخول للمتابعة إلى نظام <strong>ERPNext</strong></div>
          <label>اسم المستخدم</label>
          <input class="form-control" placeholder="أدخل اسم المستخدم">
          <label>كلمة المرور</label>
          <input class="form-control" placeholder="أدخل كلمة المرور" type="password">
          <div class="login-row"><a>نسيت كلمة المرور؟</a><span>تذكرني □</span></div>
          <button class="btn-primary" style="width:100%">تسجيل الدخول</button>
          <div class="separator">أو تسجيل الدخول باستخدام</div>
          <button class="sso">الدخول الموحد (SSO)</button>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
